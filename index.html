<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invito Serena 18</title>

  <style>
    @font-face {
      font-family: "miofont";
      src: url("miofont.ttf");
    }

    body {
      margin: 0;
      background: black;
      font-family: Arial, sans-serif;
      overflow: hidden;
      text-align: center;
    }

    #videoContainer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* IMMAGINE START */
    #startImage {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 10;
    }

    /* IMMAGINE END */
    #endImage {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      z-index: 10;
    }

    #musicButton {
      position: absolute;
      top: 20px;
      right: 5px;
      padding: 4px 10px;
      font-size: 11px;
      border-radius: 16px;
      border: none;
      background: rgba(255, 255, 255, 0.5);
      color: black;
      cursor: pointer;
      z-index: 5;
      display: none;
    }

    #openButton {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 50px;
      font-size: 26px;
      border-radius: 30px;
      border: 2px solid #666;
      background: #888;
      color: white;
      cursor: pointer;
      white-space: nowrap;
      z-index: 11;
    }

    #buttons {
      position: absolute;
      bottom: 60px;
      width: 100%;
      display: none;
      justify-content: center;
      gap: 20px;
      z-index: 4;
    }

    .circle {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      font-size: 18px;
      cursor: pointer;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 6;
    }

    #popupContent {
      background: white;
      padding: 30px;
      border-radius: 10px;
      font-size: 22px;
    }
  </style>
</head>

<body>

  <!-- IMMAGINE START -->
  <img id="startImage" src="start.jpg" alt="Start">

  <!-- IMMAGINE END -->
  <img id="endImage" src="end.jpeg" alt="End">

  <div id="videoContainer">
    <video id="video" preload="auto" playsinline webkit-playsinline muted>
      <source src="video.mp4" type="video/mp4">
    </video>
  </div>

  <audio id="music">
    <source src="musica.mp3" type="audio/mpeg">
  </audio>

  <button id="musicButton" onclick="toggleMusic()">Ferma musica</button>

  <button id="openButton">Tocca per aprire</button>

  <div id="buttons">
    <button class="circle" onclick="showInfo()">ℹ️</button>
    <button class="circle" onclick="window.open('https://maps.app.goo.gl/hBG8Wvnyr54EpZgt7')">📍</button>
  </div>

  <div id="popup" onclick="closePopup()">
    <div id="popupContent">
      Dress code 👗: No Rosa e No Rosso
    </div>
  </div>

  <script>
    let video = document.getElementById("video");
    let music = document.getElementById("music");
    let openButton = document.getElementById("openButton");
    let buttons = document.getElementById("buttons");
    let musicButton = document.getElementById("musicButton");
    let startImage = document.getElementById("startImage");
    let endImage = document.getElementById("endImage");

    openButton.onclick = function () {
      openButton.style.display = "none";
      startImage.style.display = "none";

      setTimeout(function () {
        video.muted = false;

        video.play().catch(() => { });

        music.play().then(() => {
          musicButton.style.display = "block";
        }).catch(() => {
          musicButton.style.display = "block";
        });

        video.onended = function () {
          buttons.style.display = "flex";
          endImage.style.display = "block";
        };
      }, 0);
    };

    function showInfo() {
      document.getElementById("popup").style.display = "flex";
    }

    function closePopup() {
      document.getElementById("popup").style.display = "none";
    }

    function toggleMusic() {
      if (music.muted) {
        music.muted = false;
        musicButton.innerText = "Ferma musica";
      } else {
        music.muted = true;
        musicButton.innerText = "Attiva musica";
      }
    }

    let startY = 0;
    let endY = 0;

    document.addEventListener("touchstart", function (e) {
      if (e.touches.length > 0) startY = e.touches[0].clientY;
    });

    document.addEventListener("touchmove", function (e) {
      if (e.touches.length > 0) endY = e.touches[0].clientY;
    });

    document.addEventListener("touchend", function () {
      if (endY - startY > 120) location.reload();
    });
  </script>

</body>
</html>
