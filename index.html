<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<title>Invito Serena 18</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
overflow:hidden;
text-align:center;
}

#video{
position:center;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

#openButton{
position:absolute;
bottom:80px;
left:50%;
transform:translateX(-50%);
padding:20px 50px;
font-size:26px;
border-radius:30px;
border:2px solid white;
background:transparent;
color:white;
cursor:pointer;
}

#buttons{
position:absolute;
bottom:60px;
width:100%;
display:none;
justify-content:center;
gap:20px;
}

.circle{
width:120px;
height:120px;
border-radius:50%;
border:none;
font-size:28px;
cursor:pointer;
background:white;
}

#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

#popupContent{
background:white;
padding:30px;
border-radius:10px;
font-size:22px;
}

</style>
</head>

<body>

<video id="video" preload="auto">
<source src="video.mp4" type="video/mp4">
</video>

<audio id="music">
<source src="musica.mp3" type="audio/mpeg">
</audio>

<button id="openButton">Tocca per aprire</button>

<div id="buttons">

<button class="circle" onclick="showInfo()">i</button>

<button class="circle"
onclick="window.open('https://maps.app.goo.gl/hBG8Wvnyr54EpZgt7')">
📍
</button>

</div>

<div id="popup" onclick="closePopup()">
<div id="popupContent">
Dress code Arancione come le zucche 🎃
</div>
</div>

<script>

let video = document.getElementById("video");
let music = document.getElementById("music");
let openButton = document.getElementById("openButton");
let buttons = document.getElementById("buttons");

openButton.onclick = function(){

video.play();
music.play();

openButton.style.display="none";

video.onended = function(){
buttons.style.display="flex";
}

}

function showInfo(){
document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
